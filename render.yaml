services:
  - type: web
    name: universal-ai-server
    region: singapore
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: universal-ai-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: ACCESS_TOKEN
        generateValue: true
      - key: PORT
        value: 3210
      - key: CENTRUM_URL
        value: https://spoika.vercel.app

databases:
  - name: universal-ai-db
    databaseName: universal_ai
    plan: free
